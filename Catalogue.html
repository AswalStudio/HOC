    <style>
      /* --- 100% WIDTH LUXURY OVERRIDES --- */
      /* These classes are specifically named to prevent your style.css from breaking them */

      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden; /* Prevents horizontal scrollbar */
      }

      /* Full Width Hero */
      .fw-hero {
        width: 100%;
        background-color: #1a1a1a !important;
        background-image: none !important; /* Forces global background images away */
        padding: 180px 5% 100px;
        text-align: center;
        box-sizing: border-box;
        border-bottom: 4px solid #d4af37;
      }
      .fw-hero h1 {
        font-family: "Playfair Display", serif;
        font-size: 3.5rem;
        color: #ffffff; /* Fixed dark text issue */
        margin-bottom: 20px;
        letter-spacing: 1px;
      }
      .fw-hero p {
        font-family: "Lora", serif;
        font-size: 1.2rem;
        color: #dcdcdc;
        max-width: 800px;
        margin: 0 auto;
      }

      /* Full Width Sections */
      .fw-section {
        width: 100%;
        padding: 100px 5%; /* 5% padding on sides keeps it 100% wide but neat */
        box-sizing: border-box;
      }

      .fw-bg-light {
        background-color: #f8f9fa !important; /* Clean light gray */
        background-image: none !important; /* Removes the living room image */
      }

      .fw-bg-white {
        background-color: #ffffff !important;
        background-image: none !important; /* Removes the living room image */
      }

      .fw-section-title {
        font-family: "Playfair Display", serif;
        font-size: 2.8rem;
        color: #111;
        text-align: center;
        margin-bottom: 60px;
        position: relative;
      }
      .fw-section-title::after {
        content: "";
        display: block;
        width: 80px;
        height: 3px;
        background-color: #d4af37;
        margin: 20px auto 0;
      }

      /* Fluid Grid System */
      .fw-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 30px;
        width: 100%;
      }

      /* Premium Visual Category Cards */
      .fw-cat-card {
        background: #ffffff;
        border-radius: 8px;
        overflow: hidden;
        text-decoration: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
        transition:
          transform 0.4s ease,
          box-shadow 0.4s ease;
        display: flex;
        flex-direction: column;
      }
      .fw-cat-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      }

      .fw-cat-img {
        width: 100%;
        height: 250px;
        background-color: #f0f0f0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
      }
      .fw-cat-img img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        transition: transform 0.5s ease;
        mix-blend-mode: multiply; /* Removes white backgrounds from product images */
      }
      .fw-cat-card:hover .fw-cat-img img {
        transform: scale(1.1);
      }

      .fw-cat-title {
        padding: 25px 20px;
        text-align: center;
      }
      .fw-cat-title h3 {
        font-family: "Playfair Display", serif;
        font-size: 1.5rem;
        color: #222;
        margin: 0;
        transition: color 0.3s ease;
      }
      .fw-cat-card:hover .fw-cat-title h3 {
        color: #d4af37;
      }

      /* Fluid Brand Grid */
      .fw-brand-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
        width: 100%;
      }
      .fw-brand-card {
        background: #ffffff;
        border: 1px solid #eaeaea;
        padding: 40px 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        border-radius: 4px;
      }
      .fw-brand-card img {
        max-width: 140px;
        max-height: 70px;
        object-fit: contain;
        filter: grayscale(60%) opacity(0.6);
        transition: all 0.4s ease;
      }
      .fw-brand-card:hover {
        border-color: #d4af37;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      }
      .fw-brand-card:hover img {
        filter: grayscale(0%) opacity(1);
        transform: scale(1.5);
      }

      @media (max-width: 768px) {
        .fw-brand-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 15px; /* Slightly smaller gap for mobile screens */
        }

        .fw-brand-card {
          padding: 20px 10px; /* Reduced padding so logos fit comfortably */
        }
      }
    </style>
